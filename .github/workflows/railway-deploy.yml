name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_flutter:
        description: 'Set to true to skip Flutter build and only deploy backend'
        required: false
        default: 'false'

jobs:
  deploy:
    name: Build and deploy to Railway
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: https://unique-blessing-production-ae97.up.railway.app/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        if: ${{ github.event.inputs.skip_flutter != 'true' }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.6'

      - name: Enable Flutter Web
        if: ${{ github.event.inputs.skip_flutter != 'true' }}
        run: |
          flutter config --enable-web
          flutter doctor -v

      - name: Get Flutter dependencies
        if: ${{ github.event.inputs.skip_flutter != 'true' }}
        run: flutter pub get

      - name: Build Flutter Web
        if: ${{ github.event.inputs.skip_flutter != 'true' }}
        run: flutter build web --release --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm ci
        working-directory: afrijob_backend

      - name: Copy Flutter web build into backend
        if: ${{ github.event.inputs.skip_flutter != 'true' }}
        run: |
          mkdir -p afrijob_backend/build
          cp -R build/web afrijob_backend/build/web

      - name: Install Railway CLI
        run: |
          curl -sSL https://railway.app/install.sh | bash
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Deploy backend service
        working-directory: afrijob_backend
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
        run: railway up --detach
