name: Build and deploy to Render

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.14.0

      - name: Install frontend dependencies
        run: |
          cd frontend
          flutter pub get

      - name: Build Flutter web
        run: |
          cd frontend
          flutter build web --release

      - name: Verify build output
        run: |
          if [ -d frontend/build/web ]; then
            echo "✓ Flutter web build successful"
            ls -la frontend/build/web/ | head -20
          else
            echo "✗ Flutter web build directory not found"
            exit 1
          fi

      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_SERVICE_ID}" ]; then
            echo "Skipping Render deploy because required secrets are missing or empty."
            exit 0
          fi

          echo "Deploying to Render service: ${RENDER_SERVICE_ID}"
          curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":true}' \
            -w "\nResponse status: %{http_code}\n"
          echo "Deployment triggered successfully"

      - name: Deployment complete
        if: always()
        run: |
          echo "Build and deployment workflow completed at $(date)"
          echo "Check Render dashboard for service status at https://dashboard.render.com"
