services:
  - type: web
    name: mon-application-job-backend
    env: node
    plan: free
    branch: main
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: '3001'
      - key: DB_HOST
        value: 'localhost'
      - key: DB_USER
        value: 'root'
      - key: DB_PASSWORD
        value: ''
      - key: DB_NAME
        value: 'bddiane_sp'
      - key: JWT_SECRET
        value: 'change_this_secret_in_production'
      - key: JWT_EXPIRE
        value: '30d'
      - key: CORS_ORIGIN
        value: 'https://your-frontend-domain.com'
