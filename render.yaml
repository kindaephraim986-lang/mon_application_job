services:
  - type: web
    name: Job Research
    env: docker
    dockerfilePath: Dockerfile
    branch: main
    plan: starter
    healthCheckPath: /api/health
    autoDeployUrl: https://render.com/docs/deploy-button
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: CORS_ORIGIN
        sync: false  # Set to your deployed frontend domain (e.g. https://your-frontend.onrender.com)
      - key: FRONTEND_URL
        sync: false  # Set to your deployed frontend URL
      - key: DB_HOST
        sync: false  # Required: Set to your MySQL host (Railway/PlanetScale)
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false  # Required: Set to your MySQL user
      - key: DB_PASSWORD
        sync: false  # Required: Set to your MySQL password
      - key: DB_NAME
        value: "job_research"
      - key: JWT_SECRET
        sync: false  # Required: set a secure random 32-byte hex string
      - key: FILE_SIGNATURE_SECRET
        sync: false  # Required: set a secure random 32-byte hex string
      - key: LOG_LEVEL
        value: info
      - key: UPLOAD_DIR
        value: /tmp/uploads

