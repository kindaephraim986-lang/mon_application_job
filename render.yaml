services:
  - type: web
    name: job-research
    env: docker
    dockerfilePath: ./Dockerfile
    branch: main
    autoDeploy: true
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: CORS_ORIGIN
        sync: false
        # Exemple: https://your-frontend.onrender.com
      - key: FRONTEND_URL
        sync: false
        # Exemple: https://job-research.onrender.com
      - key: DB_HOST
        sync: false
        # Exemple: db.example.com (MySQL externe, pas localhost)
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: "bddiane_sp"
      - key: JWT_SECRET
        sync: false
        # Générer une valeur forte, par exemple avec: openssl rand -hex 32
      - key: FILE_SIGNATURE_SECRET
        sync: false
        # Générer une valeur forte, par exemple avec: openssl rand -hex 32
      - key: LOG_LEVEL
        value: info
      - key: UPLOAD_DIR
        value: /tmp/uploads

